# my-buddy — nginx for the production frontend sidecar (TASKS.md E1).
#
# Serves the built Vite PWA and reverse-proxies the API to the backend so the
# browser stays on ONE origin (ARCHITECTURE.md §4). Cloudflare Access sits in
# front of this (D2) — there is deliberately NO auth logic here.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets (JS/CSS/JSON/SVG). Images + woff2 are already packed.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Container liveness for the compose healthcheck — served by nginx itself so
    # it reports THIS container's health, independent of the backend.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # API -> backend. Every §11 prefix (plus the out-of-schema /photos byte
    # route, GET /photos/{id}/content) is proxied; these must hit the network,
    # never fall through to the SPA shell.
    #
    # `set $upstream` + a resolver makes nginx re-resolve the `app` service name
    # at runtime, so a backend restart/redeploy (new container IP) doesn't leave
    # nginx pinned to a stale address (the classic Docker + nginx papercut).
    location ~ ^/(health|modules|projects|shop|photos|generate)(/|$) {
        resolver 127.0.0.11 valid=10s ipv6=off;   # Docker embedded DNS
        set $upstream app;
        proxy_pass http://$upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Generation + research web-search passes can run long (§7.2, ~180s).
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Progress-photo uploads (phone camera images).
        client_max_body_size 25m;
    }

    # The service worker must never be stale-cached, or clients get stuck on an
    # old shell (vite-plugin-pwa autoUpdate). Keep index.html revalidated too.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Content-hashed build assets — safe to cache immutably for a year.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA deep links resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
